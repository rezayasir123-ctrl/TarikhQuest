<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TarikhQuest Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="./sacred_journey_design_system/tailwind.config.js"></script>
  <link rel="stylesheet" href="./sacred_journey_design_system/index.css" />
  <style>
    body { font-family: 'Lexend', sans-serif; }
    .stage-chip.active { background: var(--color-primary-container); color: var(--color-on-primary-container); }
  </style>
</head>
<body class="min-h-screen bg-background text-on-background">
  <div id="app" class="mx-auto max-w-5xl px-4 py-4 pb-24"></div>
  <script>
    const state = {
      user: null,
      role: null,
      screen: 'splash',
      storyIndex: 0,
      storyCompleted: false,
      challengeCompleted: false,
      quizPassed: false,
      qrValidated: false,
      reflection: '',
      points: 0,
      progress: 0
    };

    const navItems = [
      { screen: 'dashboard', label: 'Home', icon: 'home' },
      { screen: 'story', label: 'Story', icon: 'auto_stories' },
      { screen: 'leaderboard', label: 'Ranks', icon: 'emoji_events' },
      { screen: 'reflection', label: 'Profile', icon: 'person' }
    ];

    const screens = {
      splash: () => `
        <section class="mx-auto flex min-h-[82vh] max-w-3xl flex-col items-center justify-center rounded-[32px] border border-outline-variant/20 bg-surface-container-lowest p-8 text-center shadow-lg">
          <div class="mb-6 flex h-20 w-20 items-center justify-center rounded-[24px] bg-primary text-on-primary shadow-lg">
            <span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">history_edu</span>
          </div>
          <h1 class="sj-headline-lg-mobile text-primary">TarikhQuest</h1>
          <p class="sj-body-md mt-3 text-on-surface-variant">Augmented Reality Game Pembelajaran Sejarah Islam</p>
          <p class="sj-body-md mt-4 text-on-surface-variant">Alur belajar dari login, cerita, tantangan, kuis, scan QR, leaderboard, hasil belajar, hingga refleksi kini terhubung dalam satu platform yang konsisten.</p>
          <button class="sj-btn-primary sj-btn-primary--lg mt-8" onclick="goTo('login')">Mulai Sekarang</button>
        </section>
      `,
      login: () => `
        <section class="mx-auto flex max-w-2xl flex-col rounded-[32px] border border-outline-variant/20 bg-surface-container-lowest p-8 shadow-lg">
          <div class="mb-6 flex items-center gap-3">
            <div class="flex h-12 w-12 items-center justify-center rounded-[16px] bg-primary text-on-primary">
              <span class="material-symbols-outlined text-[28px]">lock_open</span>
            </div>
            <div>
              <h2 class="sj-headline-md text-primary">Masuk ke TarikhQuest</h2>
              <p class="sj-body-md text-on-surface-variant">Pilih peran lalu lanjutkan ke dashboard sesuai aksesmu.</p>
            </div>
          </div>
          <div class="space-y-4">
            <div>
              <label class="sj-label-md mb-2 block text-on-surface-variant">Nama Panggilan</label>
              <input id="nameInput" class="sj-input w-full" placeholder="Contoh: Ahmad" />
            </div>
            <div>
              <label class="sj-label-md mb-2 block text-on-surface-variant">Kelas</label>
              <select id="classInput" class="sj-select w-full">
                <option value="">Pilih Kelas</option>
                <option value="7">Kelas 7</option>
                <option value="8">Kelas 8</option>
                <option value="9">Kelas 9</option>
              </select>
            </div>
            <div>
              <label class="sj-label-md mb-2 block text-on-surface-variant">Pilih Peran</label>
              <div class="grid gap-3 md:grid-cols-2">
                <button type="button" class="rounded-[20px] border border-outline-variant/20 bg-surface-container-low p-4 text-left" onclick="state.role='siswa'; document.getElementById('roleLabel').textContent='Siswa'">
                  <p class="sj-headline-md text-primary">Siswa</p>
                  <p class="sj-body-md text-on-surface-variant">Akses dashboard pembelajaran.</p>
                </button>
                <button type="button" class="rounded-[20px] border border-outline-variant/20 bg-surface-container-low p-4 text-left" onclick="state.role='guru'; document.getElementById('roleLabel').textContent='Guru'">
                  <p class="sj-headline-md text-primary">Guru</p>
                  <p class="sj-body-md text-on-surface-variant">Akses dashboard pengelolaan kelas.</p>
                </button>
              </div>
              <p id="roleLabel" class="sj-label-sm mt-2 text-on-surface-variant">Belum memilih peran</p>
            </div>
            <button class="sj-btn-primary sj-btn-primary--full" onclick="submitLogin()">Lanjut ke Dashboard</button>
          </div>
        </section>
      `,
      dashboard: () => `
        <section class="space-y-4">
          <div class="rounded-[28px] border border-outline-variant/20 bg-gradient-to-br from-primary-container via-surface-container-lowest to-surface-container p-6 shadow-sm">
            <p class="sj-label-sm text-on-surface-variant">Selamat datang</p>
            <h2 class="sj-headline-lg-mobile text-primary">${state.user?.name || 'Pengguna'}</h2>
            <p class="sj-body-md mt-2 text-on-surface-variant">Kamu sedang menempuh perjalanan sejarah Islam dengan progres ${state.progress}% dan ${state.points} poin.</p>
            <div class="mt-4 h-2 rounded-full bg-surface-variant">
              <div class="h-2 rounded-full bg-primary" style="width: ${state.progress}%"></div>
            </div>
            <div class="mt-4 flex flex-wrap gap-3">
              <button class="sj-btn-primary sj-btn-primary--sm" onclick="goTo('story')">Lanjutkan misi</button>
              <button class="sj-btn-ghost" onclick="goTo('result')">Lihat hasil</button>
            </div>
          </div>

          <div class="grid gap-3 md:grid-cols-2">
            <button class="rounded-[24px] border border-outline-variant/20 bg-surface-container-lowest p-4 text-left shadow-sm" onclick="goTo('story')">
              <div class="mb-3 flex h-11 w-11 items-center justify-center rounded-[14px] bg-primary-container text-on-primary-container">
                <span class="material-symbols-outlined">auto_stories</span>
              </div>
              <h3 class="sj-headline-md text-primary">Cerita Hijrah</h3>
              <p class="sj-body-md mt-1 text-on-surface-variant">Ikuti alur narasi dan pahami konteks sejarah.</p>
            </button>
            <button class="rounded-[24px] border border-outline-variant/20 bg-surface-container-lowest p-4 text-left shadow-sm" onclick="goTo('challenge')">
              <div class="mb-3 flex h-11 w-11 items-center justify-center rounded-[14px] bg-secondary-container text-on-secondary-container">
                <span class="material-symbols-outlined">task_alt</span>
              </div>
              <h3 class="sj-headline-md text-primary">Tantangan</h3>
              <p class="sj-body-md mt-1 text-on-surface-variant">Selesaikan misi untuk membuka kuis berikutnya.</p>
            </button>
            <button class="rounded-[24px] border border-outline-variant/20 bg-surface-container-lowest p-4 text-left shadow-sm" onclick="goTo('quiz')">
              <div class="mb-3 flex h-11 w-11 items-center justify-center rounded-[14px] bg-tertiary-container text-on-tertiary-container">
                <span class="material-symbols-outlined">quiz</span>
              </div>
              <h3 class="sj-headline-md text-primary">Quiz</h3>
              <p class="sj-body-md mt-1 text-on-surface-variant">Uji pemahamanmu tentang hijrah dan tokoh penting.</p>
            </button>
            <button class="rounded-[24px] border border-outline-variant/20 bg-surface-container-lowest p-4 text-left shadow-sm" onclick="goTo('qr')">
              <div class="mb-3 flex h-11 w-11 items-center justify-center rounded-[14px] bg-primary-container text-on-primary-container">
                <span class="material-symbols-outlined">qr_code_2</span>
              </div>
              <h3 class="sj-headline-md text-primary">Scan QR</h3>
              <p class="sj-body-md mt-1 text-on-surface-variant">Buka artefak digital setelah menyelesaikan quiz.</p>
            </button>
          </div>
        </section>
      `,
      story: () => `
        <section class="rounded-[28px] border border-outline-variant/20 bg-surface-container-lowest p-6 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <button class="sj-btn-icon" onclick="goTo('dashboard')"><span class="material-symbols-outlined">arrow_back</span></button>
            <h2 class="sj-headline-md text-primary">Cerita Hijrah</h2>
            <div class="rounded-full bg-tertiary-container px-3 py-2 text-on-tertiary-container">⭐ ${state.points}</div>
          </div>

          <div class="mb-6 flex items-center justify-between rounded-full bg-surface-container p-2">
            ${['Cerita','Tantangan','Hadiah'].map((label, index) => `
              <div class="flex items-center gap-2 px-2 py-1 ${index === 0 ? 'text-primary' : 'text-on-surface-variant'}">
                <span class="flex h-7 w-7 items-center justify-center rounded-full ${index === 0 ? 'bg-primary text-on-primary' : 'bg-surface-variant'}">${index + 1}</span>
                <span class="sj-label-sm">${label}</span>
              </div>
            `).join('')}
          </div>

          <div class="rounded-[24px] bg-surface-container-low p-5">
            <p class="sj-label-sm text-primary">Bagian ${state.storyIndex + 1}</p>
            <h3 class="sj-headline-md mt-2">${storySteps[state.storyIndex].title}</h3>
            <p class="sj-body-md mt-3 text-on-surface-variant">${storySteps[state.storyIndex].body}</p>
          </div>

          <div class="mt-6 flex gap-3">
            <button class="sj-btn-ghost flex-1" onclick="prevStory()">Sebelumnya</button>
            <button class="sj-btn-primary flex-1" onclick="nextStory()">Lanjut</button>
          </div>
          <div class="mt-3 grid gap-3 md:grid-cols-2">
            <button class="sj-btn-secondary w-full" onclick="finishStory()">Selesaikan cerita</button>
            <button class="sj-btn-ghost w-full" onclick="goTo('challenge')">Ke tantangan</button>
          </div>
        </section>
      `,
      challenge: () => `
        <section class="rounded-[28px] border border-outline-variant/20 bg-surface-container-lowest p-6 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="sj-headline-md text-primary">Tantangan Strategi Hijrah</h2>
            <span class="rounded-full bg-primary-container px-3 py-2 text-on-primary-container">Misi 2/3</span>
          </div>
          <p class="sj-body-md text-on-surface-variant">Selesaikan urutan berikut untuk membuka quiz dengan poin bonus.</p>
          <div class="mt-5 space-y-3 rounded-[20px] bg-surface-container-low p-4">
            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-primary">task_alt</span><span>Analisis lokasi hijrah dan pilih jalur aman.</span></div>
            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-primary">task_alt</span><span>Identifikasi peran tokoh yang membantu perjalanan.</span></div>
            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-primary">task_alt</span><span>Catat nilai keteguhan yang dipelajari dari hijrah.</span></div>
          </div>
          <div class="mt-6 grid gap-3 md:grid-cols-2">
            <button class="sj-btn-primary w-full" onclick="completeChallenge()">Selesaikan tantangan</button>
            <button class="sj-btn-ghost w-full" onclick="goTo('quiz')">Lanjut ke quiz</button>
          </div>
        </section>
      `,
      quiz: () => `
        <section class="rounded-[28px] border border-outline-variant/20 bg-surface-container-lowest p-6 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="sj-headline-md text-primary">Quiz Hijrah</h2>
            <span class="rounded-full bg-primary px-3 py-2 text-on-primary">Timer 30s</span>
          </div>
          <div class="mb-4 h-2 rounded-full bg-surface-variant">
            <div class="h-2 rounded-full bg-primary" style="width: 25%"></div>
          </div>
          <p class="sj-label-sm text-primary">Soal 1/4</p>
          <div class="mt-3 rounded-[24px] bg-surface-container-low p-5">
            <h3 class="sj-headline-md">Siapakah sahabat yang menemani Nabi Muhammad SAW dalam hijrah pertama?</h3>
            <div class="mt-4 grid gap-3">
              <button class="sj-btn-ghost w-full text-left" onclick="answerQuiz('Abu Bakar Ash-Shiddiq')">Abu Bakar Ash-Shiddiq</button>
              <button class="sj-btn-ghost w-full text-left" onclick="answerQuiz('Umar bin Khattab')">Umar bin Khattab</button>
              <button class="sj-btn-ghost w-full text-left" onclick="answerQuiz('Usman bin Affan')">Usman bin Affan</button>
            </div>
          </div>
          <p id="quizResult" class="sj-body-md mt-4 text-on-surface-variant"></p>
          <div class="mt-4 flex gap-3">
            <button class="sj-btn-ghost flex-1" onclick="goTo('challenge')">Kembali</button>
            <button class="sj-btn-secondary flex-1" onclick="goTo('qr')" ${state.quizPassed ? '' : 'disabled'}>Buka QR</button>
          </div>
        </section>
      `,
      qr: () => `
        <section class="rounded-[28px] border border-outline-variant/20 bg-surface-container-lowest p-6 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="sj-headline-md text-primary">Scan QR Artefak</h2>
            <span class="rounded-full bg-primary-container px-3 py-2 text-on-primary-container">Artefak digital</span>
          </div>
          <div class="mt-6 rounded-[24px] border border-outline-variant/20 bg-surface-container-low p-8 text-center">
            <span class="material-symbols-outlined text-[64px] text-primary">qr_code_2</span>
            <p class="sj-body-md mt-3 text-on-surface-variant">Pindai kode untuk membuka artefak digital tentang hijrah Nabi Muhammad SAW.</p>
          </div>
          <button class="sj-btn-primary mt-4 w-full" onclick="validateQr()">Validasi QR</button>
          <p class="sj-body-md mt-3 text-on-surface-variant">${state.quizPassed ? 'QR siap divalidasi.' : 'Selesaikan quiz dulu.'}</p>
        </section>
      `,
      leaderboard: () => `
        <section class="rounded-[28px] border border-outline-variant/20 bg-surface-container-lowest p-6 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="sj-headline-md text-primary">Leaderboard</h2>
            <span class="rounded-full bg-primary-container px-3 py-2 text-on-primary-container">Top kelas</span>
          </div>
          <div class="mb-4 rounded-[24px] border border-outline-variant/20 bg-surface-container-low p-4">
            <p class="sj-label-sm text-on-surface-variant">Peringkat kamu</p>
            <h3 class="sj-headline-md text-primary">${state.user?.name || 'Pengguna'} · ${state.points} poin</h3>
          </div>
          <div class="space-y-3">
            ${leaderboardData.map(item => `
              <div class="rounded-[16px] border border-outline-variant/20 bg-surface-container-low p-4">
                <div class="flex items-center justify-between">
                  <div>
                    <p class="sj-label-sm text-primary">#${item.rank}</p>
                    <h3 class="sj-headline-md">${item.name}</h3>
                    <p class="sj-body-md text-on-surface-variant">${item.badge} · Level ${item.level}</p>
                  </div>
                  <div class="text-right">
                    <p class="sj-headline-md text-primary">${item.points}</p>
                    <p class="sj-label-sm text-on-surface-variant">poin</p>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `,
      result: () => `
        <section class="rounded-[28px] border border-outline-variant/20 bg-surface-container-lowest p-6 shadow-sm">
          <h2 class="sj-headline-md text-primary">Hasil Belajar</h2>
          <div class="mt-4 grid gap-3 md:grid-cols-2">
            <div class="rounded-[20px] bg-surface-container-low p-4">
              <p class="sj-label-sm text-on-surface-variant">Poin total</p>
              <h3 class="sj-headline-lg-mobile mt-1 text-primary">${state.points} pts</h3>
            </div>
            <div class="rounded-[20px] bg-surface-container-low p-4">
              <p class="sj-label-sm text-on-surface-variant">Progress</p>
              <h3 class="sj-headline-lg-mobile mt-1 text-primary">${state.progress}%</h3>
            </div>
          </div>
          <div class="mt-4 rounded-[24px] bg-surface-container-low p-4">
            <p class="sj-body-md text-on-surface-variant">Challenge: ${state.challengeCompleted ? 'Selesai' : 'Belum'}</p>
            <p class="sj-body-md text-on-surface-variant">Quiz: ${state.quizPassed ? 'Lulus' : 'Belum'}</p>
            <p class="sj-body-md text-on-surface-variant">QR: ${state.qrValidated ? 'Valid' : 'Belum'}</p>
            <p class="sj-body-md text-on-surface-variant">Refleksi: ${state.reflection ? 'Tersimpan' : 'Belum'}</p>
          </div>
          <div class="mt-4 flex gap-3">
            <button class="sj-btn-primary flex-1" onclick="goTo('reflection')">Isi refleksi</button>
            <button class="sj-btn-ghost flex-1" onclick="goTo('dashboard')">Kembali</button>
          </div>
        </section>
      `,
      reflection: () => `
        <section class="rounded-[28px] border border-outline-variant/20 bg-surface-container-lowest p-6 shadow-sm">
          <h2 class="sj-headline-md text-primary">Refleksi Afektif</h2>
          <p class="sj-body-md mt-2 text-on-surface-variant">Tuliskan perasaanmu setelah menyelesaikan perjalanan hari ini.</p>
          <textarea id="reflectionInput" class="sj-textarea mt-4 w-full" placeholder="Saya merasa..."></textarea>
          <div class="mt-4 flex flex-wrap gap-2">
            <span class="rounded-full bg-surface-variant px-3 py-2 text-on-surface-variant">Semangat</span>
            <span class="rounded-full bg-surface-variant px-3 py-2 text-on-surface-variant">Tertarik</span>
            <span class="rounded-full bg-surface-variant px-3 py-2 text-on-surface-variant">Bangga</span>
          </div>
          <div class="mt-4 flex gap-3">
            <button class="sj-btn-primary flex-1" onclick="saveReflection()">Simpan refleksi</button>
            <button class="sj-btn-ghost flex-1" onclick="goTo('dashboard')">Kembali</button>
          </div>
          <p class="sj-body-md mt-3 text-on-surface-variant">${state.reflection ? 'Refleksi tersimpan.' : 'Belum ada refleksi.'}</p>
        </section>
      `
    };

    const storySteps = [
      { title: 'Perjalanan Rahasia', body: 'Nabi Muhammad SAW memulai hijrah dengan penuh kehati-hatian. Perjalanan ini menjadi tonggak besar bagi sejarah Islam.' },
      { title: 'Strategi Menyelinap', body: 'Ali bin Abi Thalib membantu menjaga aman rencana hijrah agar tidak diketahui musuh.' },
      { title: 'Madinah yang Menanti', body: 'Hijrah membawa harapan baru bagi kaum Muslimin dan membentuk fondasi masyarakat yang adil.' }
    ];

    const leaderboardData = [
      { rank: 1, name: 'Aisyah', points: 1450, badge: 'Scholar', level: 3 },
      { rank: 2, name: 'Zaid', points: 1320, badge: 'Explorer', level: 3 },
      { rank: 3, name: 'Ahmad', points: 1200, badge: 'Quest Master', level: 2 },
      { rank: 4, name: 'Nadia', points: 1180, badge: 'Learner', level: 2 }
    ];

    function updateProgress() {
      let progress = 0;
      if (state.user) progress += 15;
      if (state.storyCompleted) progress += 20;
      if (state.challengeCompleted) progress += 20;
      if (state.quizPassed) progress += 20;
      if (state.qrValidated) progress += 15;
      if (state.reflection) progress += 10;
      state.progress = Math.min(progress, 100);
      return state.progress;
    }

    function render() {
      updateProgress();
      document.getElementById('app').innerHTML = `
        ${state.screen === 'splash' || state.screen === 'login' ? '' : `
          <header class="sj-top-bar sj-top-bar--sticky mb-4 rounded-[24px]">
            <div class="sj-top-bar__left">
              <div class="sj-top-bar__avatar flex items-center justify-center bg-primary text-on-primary">
                <span class="material-symbols-outlined">history_edu</span>
              </div>
              <div class="sj-top-bar__user-info">
                <span class="sj-top-bar__greeting">Halo</span>
                <span class="sj-top-bar__username">${state.user?.name || 'Pengguna'}</span>
              </div>
            </div>
            <div class="sj-top-bar__right">
              <span class="rounded-full bg-tertiary-container px-3 py-2 text-on-tertiary-container">⭐ ${state.points}</span>
            </div>
          </header>
        `}
        <div class="mx-auto max-w-4xl">
          ${screens[state.screen] ? screens[state.screen]() : screens.splash()}
        </div>
        ${state.screen === 'splash' || state.screen === 'login' ? '' : `
          <nav class="sj-bottom-nav mt-4">
            ${navItems.map((item) => `
              <button class="sj-nav-item ${state.screen === item.screen ? 'sj-nav-item--active' : ''}" onclick="goTo('${item.screen}')">
                <span class="material-symbols-outlined">${item.icon}</span>
                <span class="sj-nav-item__label">${item.label}</span>
              </button>
            `).join('')}
          </nav>
        `}
      `;
    }

    function goTo(screen) {
      state.screen = screen;
      render();
    }

    function submitLogin() {
      const name = document.getElementById('nameInput').value.trim();
      const className = document.getElementById('classInput').value;
      if (!name || !className || !state.role) return;
      state.user = { name, className };
      state.points = 100;
      if (state.role === 'guru') {
        window.location.href = './dashboard_guru_tarikhquest/index.html';
        return;
      }
      goTo('dashboard');
    }

    function prevStory() {
      state.storyIndex = Math.max(0, state.storyIndex - 1);
      render();
    }

    function nextStory() {
      state.storyIndex = Math.min(storySteps.length - 1, state.storyIndex + 1);
      render();
    }

    function finishStory() {
      state.storyCompleted = true;
      state.points += 200;
      goTo('challenge');
    }

    function completeChallenge() {
      state.challengeCompleted = true;
      state.points += 150;
      goTo('quiz');
    }

    function answerQuiz(value) {
      const correct = value === 'Abu Bakar Ash-Shiddiq';
      state.quizPassed = correct;
      state.points += correct ? 250 : 0;
      document.getElementById('quizResult').textContent = correct ? 'Jawaban benar. QR sekarang aktif.' : 'Jawaban salah. Coba ulang dari dashboard.';
      if (correct) setTimeout(() => goTo('qr'), 400);
    }

    function validateQr() {
      if (!state.quizPassed) return;
      state.qrValidated = true;
      state.points += 300;
      goTo('leaderboard');
    }

    function saveReflection() {
      const value = document.getElementById('reflectionInput').value.trim();
      state.reflection = value;
      render();
    }

    render();
  </script>
</body>
</html>
